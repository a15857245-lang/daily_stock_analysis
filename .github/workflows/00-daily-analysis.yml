name: 每日股票分析
on:
  # 北京时间18点 = UTC10点，周一至周五
  schedule:
    - cron: '0 10 * * 1-5'
  # 网页手动一键运行
  workflow_dispatch:
    inputs:
      mode:
        description: 运行模式
        required: true
        default: full
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: 强制运行，跳过交易日检测
        required: false
        default: false
        type: boolean

# 并发控制：同一时间只跑一个分析任务
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    # 已删除非法 environment: STOCK_LIST 行
    # 修复timeout表达式，兜底固定30分钟，无解析报错
    timeout-minutes: ${{ vars.ANALYSIS_TIMEOUT_MINUTES != '' && fromJSON(vars.ANALYSIS_TIMEOUT_MINUTES) || 30 }}

    steps:
      - name: 随机延迟0-60秒，防风控限流
        run: sleep $((RANDOM % 60))

      - name: 拉取仓库全部代码
        uses: actions/checkout@v5

      - name: 配置Python3.11环境，缓存pip依赖
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装项目所有依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建数据、日志、报告目录
        run: mkdir -p data logs reports

      # 关键调试步骤：打印飞书webhook是否正常读取，一眼定位空值问题
      - name: 校验飞书推送配置
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "❌ 致命错误：仓库Secrets未配置 FEISHU_WEBHOOK_URL"
            exit 1
          else
            echo "✅ 飞书Webhook链接加载正常，可推送消息"
          fi

      # 仅保留股票+飞书必需变量，删除全部冗余LLM渠道、多余通知渠道，解决env超长截断问题
      - name: 执行股票分析主程序
        env:
          # ========== 飞书推送核心配置 ==========
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          FEISHU_WEBHOOK_KEYWORD: ${{ vars.FEISHU_WEBHOOK_KEYWORD || secrets.FEISHU_WEBHOOK_KEYWORD }}

          # ========== 自选股、行情基础配置 ==========
          STOCK_LIST_CONFIG: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          MARKET_REVIEW_REGION: cn
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}

          # ========== 你在用的AI模型（只保留Gemini/AIHubMix，其余全部移除） ==========
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}

          # ========== 系统运行基础参数 ==========
          LOG_LEVEL: INFO
          MAX_WORKERS: 1
          REALTIME_SOURCE_PRIORITY: tencent,akshare_sina,efinance,akshare_em
          REPORT_TYPE: simple
          TRADING_DAY_CHECK_ENABLED: true
          REPORT_SHOW_LLM_MODEL: true
        run: |
          # 自选股兜底逻辑，无配置默认600519茅台
          if [ -n "${STOCK_LIST_CONFIG:-}" ]; then
            export STOCK_LIST="$STOCK_LIST_CONFIG"
          else
            export STOCK_LIST="600519"
          fi

          # 读取手动触发参数
          MODE="${{ github.event.inputs.mode || 'full' }}"
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
            echo "⚡ 强制运行模式已开启，跳过交易日校验"
          fi

          echo "==================== 股票分析任务启动 ===================="
          echo "运行模式：$MODE"
          echo "自选股代码：$STOCK_LIST"
          echo "=========================================================="

          # 执行主分析脚本
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi

          # 执行完打印飞书推送状态（方便排查）
          echo "✅ 股票分析脚本执行完成，等待内部推送飞书报告"

      # 无论成功/失败都保存报告日志，方便线上排查
      - name: 打包报告与日志存档
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: stock-analysis-report-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      # 任务结束汇总输出
      - name: 任务执行汇总
        if: always()
        run: |
          echo "==================== 任务结束 ===================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "✅ 已生成股票分析报告文件"
            ls -lh reports/
          else
            echo "⚠️ 未输出任何分析报告"
          fi
